name: "Apply org membership changes"

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/org.tfvars'
      - 'terraform/members/*.tf'
      - '.github/workflows/members-apply.yml'
      - '.github/workflows/members-plan.yml'

permissions: {}

concurrency:
  group: terraform-actions-members

jobs:
  org-apply-changes:
    name: "Apply org membership changes"
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read
      pull-requests: write  # Required to post terraform plan comments
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6  # zizmor: ignore[unpinned-uses]
        with:
          persist-credentials: false
      - name: tofu apply
        uses: dflook/tofu-apply@c254eb5b2e48978c05587373100d26b604c2182d # v2.2.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TERRAFORM_ACTIONS_GITHUB_TOKEN: ${{ secrets.TERRAFORM_MANAGEMENT_GITHUB_TOKEN }}
        with:
          auto_approve: true
          path: "terraform/members"
          label: 'members'
          variables: |
            github_token = "${{ secrets.TERRAFORM_MANAGEMENT_GITHUB_TOKEN }}"
          var_file: |
            terraform/org.tfvars

      - name: Commit changes
        if: ${{ always() }}
        uses: devops-infra/action-commit-push@0b42c7c1bf502dc2d7c9e8b9d9d7c174a48fe7c1 # v1.3.3
        with:
          github_token: ${{ secrets.TERRAFORM_MANAGEMENT_GITHUB_TOKEN }}
          commit_prefix: "[AUTO]"
          commit_message: "Members state changes after apply"
          force: false
